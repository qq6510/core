name: Compile and Push Meta Core

on:
  workflow_dispatch:

jobs:
  # 阶段一：并行编译并打包为 tar.gz
  build:
    name: Build ${{ matrix.goos }}/${{ matrix.goarch }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - goos: linux
            goarch: amd64
          - goos: linux
            goarch: arm64
          - goos: linux
            goarch: arm
            goarm: 7
          - goos: linux
            goarch: mipsle
            gomips: softfloat

    steps:
      - name: Checkout Source Code
        uses: actions/checkout@v4
        with:
          repository: MetaCubeX/mihomo
          ref: Meta
          fetch-depth: 1

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.22'
          check-latest: true

      - name: Build and Compress
        env:
          CGO_ENABLED: 0
          GOOS: ${{ matrix.goos }}
          GOARCH: ${{ matrix.goarch }}
          GOARM: ${{ matrix.goarm }}
          GOMIPS: ${{ matrix.gomips }}
        run: |
          # 1. 确定架构后缀名称 (例如 linux-arm64)
          ARCH_SUFFIX="${GOOS}-${GOARCH}"
          [ -n "${GOARM}" ] && ARCH_SUFFIX="${ARCH_SUFFIX}v${GOARM}"
          
          echo "正在编译: $ARCH_SUFFIX"
          
          # 2. 编译出纯净的二进制文件，命名为 clash（OpenClash 解压时通常识别这个名字）
          go build -trimpath -ldflags="-s -w -buildid=" -o clash .
          
          # 3. 将编译好的 clash 二进制文件打包为 tar.gz
          TAR_NAME="clash-${ARCH_SUFFIX}.tar.gz"
          tar -czvf $TAR_NAME clash
          
          echo "打包完成: $TAR_NAME"

      # 将打包好的 tar.gz 暂存，供第二阶段使用
      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: core-${{ matrix.goos }}-${{ matrix.goarch }}${{ matrix.goarm }}
          path: "*.tar.gz"
          retention-days: 1

  # 阶段二：将所有压缩包收集并推送到你自己的 GitHub 仓库
  push_to_repo:
    name: Push to repository
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: write # 必须要有写入权限才能推送到仓库

    steps:
      - name: Checkout Current Repository
        uses: actions/checkout@v4

      - name: Create Target Directory
        run: mkdir -p mihomo

      - name: Download Built Binaries
        uses: actions/download-artifact@v4
        with:
          path: mihomo/
          merge-multiple: true # 将所有架构的 tar.gz 下载到同一个 mihomo 文件夹

      - name: Commit and Push
        run: |
          # 配置 git 机器人账号
          git config --local user.email "github-actions[bot]@users.noreply.github.com"
          git config --local user.name "github-actions[bot]"
          
          # 添加新生成的压缩包并提交
          git add mihomo/
          git commit -m "Auto-update Mihomo tar.gz binaries" || echo "No changes to commit"
          
          # 推送回你的仓库
          git push
