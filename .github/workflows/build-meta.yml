name: Compile, Compress and Push Meta Core

on:
  workflow_dispatch:

jobs:
  build:
    name: Build ${{ matrix.goos }}/${{ matrix.goarch }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - goos: linux
            goarch: amd64
          - goos: linux
            goarch: arm64
          - goos: linux
            goarch: arm
            goarm: 7
          - goos: linux
            goarch: mipsle
            gomips: softfloat

    steps:
      - name: Checkout Source Code
        uses: actions/checkout@main
        with:
          repository: MetaCubeX/mihomo
          ref: Meta
          fetch-depth: 1

      - name: Setup Go
        uses: actions/setup-go@main
        with:
          go-version: '1.22'
          check-latest: true

      - name: Install UPX
        run: sudo apt-get update && sudo apt-get install -y upx-ucl

      - name: Build, UPX and Package
        env:
          CGO_ENABLED: 0
          GOOS: ${{ matrix.goos }}
          GOARCH: ${{ matrix.goarch }}
          GOARM: ${{ matrix.goarm }}
          GOMIPS: ${{ matrix.gomips }}
        run: |
          # 1. 确定架构后缀名称
          ARCH_SUFFIX="${GOOS}-${GOARCH}"
          if [ -n "${GOARM}" ]; then
            ARCH_SUFFIX="${ARCH_SUFFIX}v${GOARM}"
          elif [ -n "${GOMIPS}" ]; then
            ARCH_SUFFIX="${ARCH_SUFFIX}-${GOMIPS}"
          fi
          
          echo "正在编译架构: $ARCH_SUFFIX"
          
          # 2. 编译二进制文件
          go build -trimpath -ldflags="-s -w -buildid=" -o clash .
          
          echo "编译完成，开始执行 UPX 压缩..."
          
          # 3. UPX 极限压缩
          if [[ "${GOARCH}" == *"mips"* ]]; then
            upx --best clash
          else
            upx --lzma --best clash
          fi
          
          # 4. 打包为 tar.gz
          TAR_NAME="clash-${ARCH_SUFFIX}.tar.gz"
          tar -czvf $TAR_NAME clash
          
          echo "打包成功: $TAR_NAME"

      - name: Upload Artifact
        uses: actions/upload-artifact@main
        with:
          name: core-${{ matrix.goos }}-${{ matrix.goarch }}${{ matrix.goarm }}
          path: "*.tar.gz"
          retention-days: 1

  push_to_repo:
    name: Push binaries to repository
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: write 

    steps:
      - name: Checkout Current Repository
        uses: actions/checkout@main

      - name: Create Target Directory
        run: mkdir -p mihomo

      - name: Download Built Binaries
        uses: actions/download-artifact@main
        with:
          path: mihomo/
          merge-multiple: true

      - name: Commit and Push
        run: |
          echo "=== 1. 查看 mihomo 文件夹内是否成功下载了文件 ==="
          ls -la mihomo/
          
          echo "=== 2. 配置 Git 账号 ==="
          git config --local user.email "github-actions[bot]@users.noreply.github.com"
          git config --local user.name "github-actions[bot]"
          
          echo "=== 3. 将文件加入 Git 暂存区 ==="
          git add mihomo/
          
          echo "=== 4. 查看当前 Git 状态 ==="
          git status
          
          echo "=== 5. 尝试提交代码 ==="
          git commit -m "Auto-update Mihomo Core (UPX Compressed)" || echo "No changes to commit"
          
          echo "=== 6. 强制推送到仓库 ==="
          git push origin HEAD --force
