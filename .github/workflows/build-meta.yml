name: Compile Meta (Mihomo) Core

# 触发条件：支持手动点击运行，也可以取消注释 push 让其每次提交自动运行
on:
  workflow_dispatch:
  # push:
  #   branches: [ main ]

jobs:
  build:
    name: Build for ${{ matrix.goos }}/${{ matrix.goarch }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        # 在这里配置你需要编译的路由器 CPU 架构
        include:
          - goos: linux
            goarch: amd64    # 常见的 x86_64 软路由
          - goos: linux
            goarch: arm64    # 常见的 ARMv8 架构 (如 R2S, 树莓派)
          - goos: linux
            goarch: arm
            goarm: 7         # ARMv7 架构 (多数普通 ARM 路由器)
          - goos: linux
            goarch: mipsle
            gomips: softfloat # 常见的 MIPS 架构 (如 斐讯 K2P)

    steps:
      # 1. 检出源码：这里直接指向你需要编译的 Meta 仓库和分支
      - name: Checkout Source Code
        uses: actions/checkout@v4
        with:
          repository: MetaCubeX/mihomo  # 【修改这里】如果需要使用其他人的 fork，修改为 "用户名/仓库名"
          ref: Meta                     # 【修改这里】指定你要编译的分支，比如 "Meta" 或 "Alpha"
          fetch-depth: 1

      # 2. 设置 Go 语言环境
      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.22' # 推荐使用较新的 Go 版本以获得更好的性能优化
          check-latest: true

      # 3. 执行交叉编译
      - name: Build Binary
        env:
          CGO_ENABLED: 0
          GOOS: ${{ matrix.goos }}
          GOARCH: ${{ matrix.goarch }}
          GOARM: ${{ matrix.goarm }}
          GOMIPS: ${{ matrix.gomips }}
        run: |
          echo "正在编译架构: $GOOS/$GOARCH"
          
          # 定义输出文件名，例如 clash_meta-linux-amd64
          OUTPUT_NAME="clash_meta-${{ matrix.goos }}-${{ matrix.goarch }}"
          [ -n "${{ matrix.goarm }}" ] && OUTPUT_NAME="${OUTPUT_NAME}v${{ matrix.goarm }}"
          
          # 执行编译，使用 -trimpath 和 -ldflags 减小体积并去除调试信息
          go build -trimpath -ldflags="-s -w -buildid=" -o $OUTPUT_NAME .
          
          echo "编译完成: $OUTPUT_NAME"

      # 4. 上传编译好的二进制文件到 GitHub Actions 的 Artifacts
      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: clash_meta-${{ matrix.goos }}-${{ matrix.goarch }}${{ matrix.goarm }}
          path: clash_meta-*
          retention-days: 7 # 生成的文件保留 7 天
